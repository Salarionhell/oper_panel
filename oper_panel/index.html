<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Операционная панель — кредитная карта</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <style>
    :root {
      --bg-main: #f8f9fa;
      --card-bg: #ffffff;
      --primary: #c62828;
      --primary-dark: #8e0000;
      --primary-soft: #ffebee;
      --text-main: #212121;
      --text-muted: #757575;
      --border-soft: #e0e0e0;
      --shadow-soft: 0 4px 12px rgba(0, 0, 0, 0.08);
      --radius-card: 12px;
      --transition-fast: 0.2s ease-in-out;
      --error: #d32f2f;
      --success: #2e7d32;
      --warning: #ed6c02;
      --info: #0288d1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
    }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* Top bar */

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 200;
      background-color: #ffffff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      padding: 8px 20px;
    }

    .top-bar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .tab-bar {
      display: flex;
      gap: 3px;
      flex-wrap: nowrap;
      min-width: 0;
      flex: 1;
    }

    .tab {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 12px;
      cursor: pointer;
      background-color: #f1f1f1;
      color: var(--text-main);
      transition: var(--transition-fast);
      min-width: 0;
      flex: 0 1 auto;
      max-width: 140px;
      overflow: hidden;
    }

    .tab span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tab-main {
      font-weight: 600;
    }

    .tab.active {
      background-color: var(--primary-soft);
      color: var(--primary-dark);
      border-color: #f8c1c1;
    }

    .tab-close-btn {
      border: none;
      background: none;
      padding: 0;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 11px;
      flex-shrink: 0;
    }

    .session-indicator {
      font-size: 13px;
    }

    .btn {
      border-radius: 999px;
      border: none;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: var(--transition-fast);
      background-color: var(--primary);
      color: #ffffff;
    }

    .btn.secondary {
      background-color: #f1f1f1;
      color: var(--text-main);
    }

    .btn.outline {
      background-color: #ffffff;
      color: var(--text-main);
      border: 1px solid var(--border-soft);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .btn:not(:disabled):hover {
      filter: brightness(0.95);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.18);
      transform: translateY(-1px);
    }

    /* Sticky info bar */

    .sticky-info {
      position: sticky;
      top: 46px;
      z-index: 190;
      background-color: #ffffff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
      padding: 6px 20px 8px;
      border-top: 1px solid #f0f0f0;
    }

    .sticky-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .client-fio {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
      margin-right: 4px;
      flex-shrink: 0;
    }

    .client-avatar {
      display: flex;
      align-items: center;
      gap: 6px;
      background-color: var(--primary-soft);
      border-radius: 999px;
      padding: 4px 10px 4px 4px;
      font-size: 13px;
      font-weight: 500;
    }

    .client-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background-color: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
    }

    .sticky-blocks {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .sticky-item {
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 999px;
      background-color: #f5f5f5;
      cursor: pointer;
      transition: var(--transition-fast);
      position: relative;
    }

    .sticky-item:hover {
      background-color: var(--primary-soft);
      color: var(--primary-dark);
    }

    .sticky-item-label {
      pointer-events: none;
    }

    /* Dropdowns */

    .dropdown {
      position: absolute;
      top: 34px;
      left: 0;
      min-width: 260px;
      background-color: #ffffff;
      border-radius: 10px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.2);
      padding: 8px 10px;
      font-size: 12px;
      color: var(--text-main);
      display: none;
      z-index: 210;
    }

    .dropdown.open {
      display: block;
    }

    /* Строка с иконкой и текстом */
    .dropdown-line {
      display: grid;
      grid-template-columns: 24px 1fr;  /* вернули ширину 24px */
      gap: 6px;
      margin-bottom: 6px;
      align-items: start;
    }

    .dropdown-line i {
      font-size: 14px;  /* вернули размер иконок к исходному 14px */
      color: var(--primary-dark);
      margin-top: 2px;
      text-align: center;
    }

    .dropdown-line span {
      line-height: 1.4;
      white-space: normal;
      word-break: break-word;
    }

    /* Для транзакций без иконок */
    .dropdown-line.no-icon {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .dropdown-line.no-icon span {
      text-align: left;
    }

    /* Транзакции в выпадающем списке: сгруппированы по дате */
    .dropdown-transaction-group {
      margin-bottom: 10px;
    }

    .dropdown-transaction-group .transaction-date {
      font-weight: 700;
      text-align: center;
      display: block;
      margin-bottom: 4px;
    }

    .dropdown-transaction-group .transaction-detail {
      font-size: 11px;
      color: var(--text-muted);
      display: block;
      padding-left: 8px;
      margin-bottom: 2px;
    }

    .dropdown-more {
      text-align: right;
      margin-top: 4px;
    }

    .dropdown-more a {
      cursor: pointer;
      color: var(--primary-dark);
      font-weight: 600;
      font-size: 18px;
      padding: 4px 8px;
      display: inline-block;
      border-radius: 4px;
      transition: background-color 0.2s;
      position: relative;
    }

    .dropdown-more a:hover {
      background-color: #f0f0f0;
    }

    .dropdown-more a:hover::after {
      content: "Открыть подробную информацию";
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #333;
      color: #fff;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 300;
    }

    /* Main layout */

    .app-main {
      padding: 12px 20px 24px;
    }

    .columns-main {
      display: grid;
      grid-template-columns: 2fr 1.2fr;
      gap: 14px;
      align-items: flex-start;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-soft);
      padding: 14px 14px 12px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Recommended operations */

    .recommended-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .recommended-card {
      flex: 1 1 150px;
      min-width: 150px;
      background: linear-gradient(135deg, #ffffff, #ffebee);
      border-radius: 10px;
      padding: 8px 10px;
      border: 1px solid #f4c4c4;
      cursor: pointer;
      font-size: 13px;
      transition: var(--transition-fast);
    }

    .recommended-card:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    /* Open requests */

    .requests-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .request-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      background-color: #ffffff;
      margin-bottom: 6px;
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .request-item:hover {
      background-color: #ffebee;
    }

    .request-icon {
      color: var(--primary);
      font-size: 14px;
      width: 20px;
      text-align: center;
    }

    .request-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .request-title {
      font-weight: 500;
      font-size: 13px;
    }

    .request-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }

    .request-date {
      color: var(--text-muted);
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      color: #fff;
    }

    .badge-success {
      background-color: var(--success);
    }
    .badge-error {
      background-color: var(--error);
    }
    .badge-warning {
      background-color: var(--warning);
    }
    .badge-info {
      background-color: var(--info);
    }

    /* Search */

    .search-row {
      margin-top: 12px;
    }

    .search-container {
      position: relative;
      margin-bottom: 12px;
    }

    .search-input {
      width: 100%;
      padding: 8px 32px 8px 28px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      font-size: 13px;
      outline: none;
      background-color: #ffffff;
      transition: var(--transition-fast);
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(198, 40, 40, 0.15);
    }

    .search-icon-left {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 13px;
    }

    /* Operation tiles – увеличенные окошки */
    .operations-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }

    .operations-column {
      background-color: #ffffff;
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      padding: 8px 10px 10px;
    }

    .operations-column-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--primary-dark);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .operations-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px; /* увеличили отступ */
    }

    .operation-tile {
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      padding: 10px 6px;
      font-size: 13px;
      cursor: pointer;
      background-color: #ffffff;
      transition: var(--transition-fast);
      text-align: center;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      word-break: break-word;
    }

    .operation-tile-desc {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .operation-tile:hover {
      background-color: #ffebee;
      border-color: var(--primary);
    }

    /* Tab content wrapper */

    .tab-content-wrapper {
      margin-top: 12px;
    }

    /* Info tab content */

    .info-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .info-table td {
      border: 1px solid var(--border-soft);
      padding: 5px 7px;
      vertical-align: top;
    }

    .info-table td:first-child {
      width: 32%;
      background-color: #fafafa;
      font-weight: 500;
    }

    .list-block {
      font-size: 13px;
    }

    .list-block ul {
      padding-left: 18px;
      margin: 4px 0 0;
    }

    /* Portfolio spacing */
    .portfolio-section {
      margin-bottom: 20px;
    }
    .portfolio-section:last-child {
      margin-bottom: 0;
    }

    /* Transactions table */
    .transactions-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .transactions-table th,
    .transactions-table td {
      border: 1px solid var(--border-soft);
      padding: 6px 8px;
      text-align: left;
    }
    .transactions-table th {
      background-color: #f5f5f5;
    }

    /* SMS table */
    .sms-table {
      width: 100%;
      border-collapse: collapse;
    }
    .sms-table th,
    .sms-table td {
      border: 1px solid var(--border-soft);
      padding: 6px 8px;
      text-align: left;
      font-size: 12px;
    }
    .sms-table th {
      background-color: #f5f5f5;
    }
    .sms-table th:nth-child(1),
    .sms-table td:nth-child(1),
    .sms-table th:nth-child(2),
    .sms-table td:nth-child(2) {
      text-align: center;
    }

    /* Simple operation content */

    .op-simple-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .op-simple-steps {
      list-style: decimal;
      padding-left: 18px;
      font-size: 13px;
    }

    .op-simple-steps li {
      margin-bottom: 4px;
    }

    /* Card wizard */

    .wizard-layout {
      display: grid;
      grid-template-columns: 1.7fr 1fr;
      gap: 12px;
    }

    .wizard-steps-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .wizard-step-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid var(--border-soft);
      background-color: #fafafa;
    }

    .wizard-step-item.current {
      border-color: var(--primary);
      background-color: var(--primary-soft);
    }

    .wizard-step-item.completed {
      border-color: #c8e6c9;
      background-color: #e8f5e9;
    }

    .wizard-step-index {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      background-color: #ffffff;
    }

    .wizard-step-item.completed .wizard-step-index {
      background-color: #4caf50;
      color: #ffffff;
      border-color: #4caf50;
    }

    .wizard-step-title-main {
      font-size: 13px;
    }

    .wizard-form-section {
      font-size: 13px;
    }

    .wizard-form-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .wizard-form-title {
      font-size: 15px;
      font-weight: 600;
    }

    .wizard-form-sub {
      display: none; /* скрыто */
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .form-label {
      font-size: 12px;
    }

    .form-control,
    .form-select,
    .form-textarea {
      border-radius: 8px;
      border: 1px solid var(--border-soft);
      padding: 6px 8px;
      font-size: 13px;
      outline: none;
      background-color: #ffffff;
      transition: var(--transition-fast);
    }

    .form-control:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(198, 40, 40, 0.15);
    }

    .form-textarea {
      min-height: 70px;
      resize: vertical;
    }

    .checkbox-inline {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .form-error {
      font-size: 11px;
      color: var(--error);
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 6px;
    }

    .radio-card {
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      padding: 6px 8px;
      display: flex;
      gap: 6px;
      align-items: flex-start;
      cursor: pointer;
      background-color: #ffffff;
      font-size: 13px;
    }

    .radio-card.selected {
      border-color: var(--primary);
      background-color: #ffebee;
    }

    .card-type-img {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: 24px;
    }

    .card-type-img.classic {
      background: linear-gradient(135deg, #78909c, #546e7a);
      color: #fff;
    }

    .card-type-img.gold {
      background: linear-gradient(135deg, #ffd54f, #ff8f00);
      color: #5d4037;
    }

    .card-type-img.platinum {
      background: linear-gradient(135deg, #b0bec5, #78909c);
      color: #263238;
    }

    .card-type-img .card-type-img-img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 8px;
    }

    .radio-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    .document-block {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border-soft);
      background-color: #fafafa;
      font-size: 13px;
    }

    .document-block i {
      color: var(--primary-dark);
      font-size: 18px;
    }

    .photo-preview-img {
      max-width: 200px;
      max-height: 180px;
      border-radius: 8px;
      border: 1px solid var(--border-soft);
    }

    .contract-text {
      font-size: 12px;
      line-height: 1.5;
      padding: 10px 12px;
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      background-color: #fafafa;
      max-height: 220px;
      overflow-y: auto;
      margin-bottom: 8px;
      white-space: pre-wrap;
    }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .summary-table td {
      border: 1px solid var(--border-soft);
      padding: 3px 6px;
    }

    .summary-table td:first-child {
      width: 38%;
      background-color: #fafafa;
      font-weight: 500;
    }

    .wizard-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    /* Modal (SMS, request details, confirmation) */

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 220;
    }

    .modal {
      background-color: #ffffff;
      border-radius: 14px;
      padding: 14px 16px 12px;
      max-width: 380px;
      width: calc(100% - 40px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
      font-size: 13px;
    }

    .modal-title {
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
    }

    /* Custom confirm */
    .confirm-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 10px;
    }

    /* Responsive */

    @media (max-width: 1024px) {
      .columns-main {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .top-bar {
        padding-inline: 10px;
      }
      .sticky-info {
        padding-inline: 10px;
      }
      .app-main {
        padding-inline: 10px;
      }

    // ---------------- CUSTOM CONFIRM ----------------

    function showConfirm(message, onYes, onNo) {
      const backdrop = document.getElementById('confirm-backdrop');
      const msgEl = document.getElementById('confirm-message');
      msgEl.textContent = message;
      backdrop.style.display = 'flex';

      const yesBtn = document.getElementById('confirm-yes');
      const noBtn = document.getElementById('confirm-no');

      const handleYes = () => {
        backdrop.style.display = 'none';
        yesBtn.removeEventListener('click', handleYes);
        noBtn.removeEventListener('click', handleNo);
        if (onYes) onYes();
      };

      const handleNo = () => {
        backdrop.style.display = 'none';
        yesBtn.removeEventListener('click', handleYes);
        noBtn.removeEventListener('click', handleNo);
        if (onNo) onNo();
      };

      yesBtn.addEventListener('click', handleYes);
      noBtn.addEventListener('click', handleNo);
    }

    function showAlert(message, callback) {
      const backdrop = document.getElementById('modal-backdrop');
      const titleEl = document.getElementById('modal-title');
      const bodyEl = document.getElementById('modal-body');
      const actionsEl = document.getElementById('modal-actions');
      titleEl.innerHTML = `<i class="fa-solid fa-info-circle"></i> Внимание`;
      bodyEl.innerHTML = `<p>${message}</p>`;
      actionsEl.innerHTML = '';
      const btn = document.createElement('button');
      btn.className = 'btn secondary';
      btn.textContent = 'OK';
      btn.addEventListener('click', () => {
        backdrop.style.display = 'none';
        if (callback) callback();
      });
      actionsEl.appendChild(btn);
      backdrop.style.display = 'flex';
    }

    // ---------------- HELPERS ----------------

    const qs = (sel) => document.querySelector(sel);
    const qsa = (sel) => Array.from(document.querySelectorAll(sel));

    function findTabByType(type, key) {
      if (type === 'info') return state.tabs.find(t => t.type === 'info' && t.payload.infoType === key);
      if (type === 'operation') return state.tabs.find(t => t.type === 'operation' && t.payload.operationName === key);
      return null;
    }

    function createTab(title, type, payload = {}) {
      // если такая вкладка уже существует, просто активируем её
      const existing = findTabByType(type, type === 'info' ? payload.infoType : payload.operationName);
      if (existing) {
        setActiveTab(existing.id);
        return existing;
      }
      const tab = {
        id: `tab-${state.nextTabId++}`,
        title,
        type,
        payload,
      };
      state.tabs.push(tab);
      state.activeTabId = tab.id;
      renderTabs();
      renderActiveTabContent();
      return tab;
    }

    function setActiveTab(id) {
      state.activeTabId = id;
      renderTabs();
      renderActiveTabContent();
    }

    function closeTab(id, options = {}) {
      const tab = state.tabs.find((t) => t.id === id);
      if (!tab) return;

      const idx = state.tabs.findIndex((t) => t.id === id);
      state.tabs.splice(idx, 1);
      
      // Если закрыли активную вкладку, переключаемся на главную
      if (state.activeTabId === id) {
        const mainTab = state.tabs.find(t => t.type === 'main');
        state.activeTabId = mainTab ? mainTab.id : (state.tabs.length ? state.tabs[0].id : null);
      }
      
      renderTabs();
      renderActiveTabContent();
    }

    function ensureMainTab() {
      if (!state.tabs.some((t) => t.type === "main")) {
        const mainTab = {
          id: "tab-main",
          title: "Главная",
          type: "main",
          payload: {},
        };
        state.tabs.unshift(mainTab);
        state.activeTabId = mainTab.id;
      }
    }

    // ---------------- DROPDOWNS ----------------

    function renderDropdowns() {
      const dropdownClient = qs("#dropdown-client");

      const dropdownPortfolio = qs("#dropdown-portfolio");
      dropdownPortfolio.innerHTML =
        portfolioDropdown

          .join("") +
        `<div class="dropdown-more"><a data-open-info="portfolio">…</a></div>`;

      const dropdownTransactions = qs("#dropdown-transactions");
      const byDate = {};
      transactionsDropdown.forEach((t) => {
        if (!byDate[t.date]) byDate[t.date] = [];
        byDate[t.date].push(t);
      });
      const datesOrder = [...new Set(transactionsDropdown.map((t) => t.date))];
      dropdownTransactions.innerHTML =
        datesOrder
          .map((date) => {

            return `

          })
          .join("") +
        `<div class="dropdown-more"><a data-open-info="transactions">…</a></div>`;

      const dropdownCases = qs("#dropdown-cases");
      dropdownCases.innerHTML =
        casesDropdown
          .map((item) => `<div class="dropdown-line"><i class="fa-solid ${item.icon}"></i><span>${item.text}</span></div>`)
          .join("") +
        `<div class="dropdown-more"><a data-open-info="cases">…</a></div>`;

      const dropdownSms = qs("#dropdown-sms");
      dropdownSms.innerHTML =
        smsDropdown
          .map(
            (s) =>
              `<div class="dropdown-line"><i class="fa-solid ${
                s.type === "sms" ? "fa-sms" : "fa-bell"
              }"></i><span>${s.date} – ${s.text}</span></div>`
          )
          .join("") +

      // Attach handlers for "..."
      qsa('[data-open-info="client"]').forEach((el) =>
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          openInfoTab("Информация о клиенте", "client");
          closeAllDropdowns();
        }),
      );
      qsa('[data-open-info="portfolio"]').forEach((el) =>
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          openInfoTab("Портфель", "portfolio");
          closeAllDropdowns();
        }),
      );
      qsa('[data-open-info="transactions"]').forEach((el) =>
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          openInfoTab("Последние транзакции", "transactions");
          closeAllDropdowns();
        }),
      );
      qsa('[data-open-info="cases"]').forEach((el) =>
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          openInfoTab("Обращения и коммуникации", "cases");
          closeAllDropdowns();
        }),
      );
      qsa('[data-open-info="sms"]').forEach((el) =>
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          openInfoTab("SMS и уведомления", "sms");
          closeAllDropdowns();
        }),
      );
    }

    function closeAllDropdowns() {
      qsa(".dropdown").forEach((d) => d.classList.remove("open"));
    }

    function initDropdownClicks() {
      qsa(".sticky-item").forEach((item) => {
        item.addEventListener("click", (e) => {
          const dropdown = item.querySelector(".dropdown");
          const isOpen = dropdown.classList.contains("open");
          closeAllDropdowns();
          if (!isOpen) {
            dropdown.classList.add("open");
          }
          e.stopPropagation();
        });
      });
      document.addEventListener("click", () => {
        closeAllDropdowns();
      });
    }

    // ---------------- TABS RENDERING ----------------

    function renderTabs() {
      const bar = qs("#tab-bar");
      bar.innerHTML = "";
      ensureMainTab();
      state.tabs.forEach((tab) => {
        const div = document.createElement("div");
        div.className = "tab";
        if (tab.type === "main") div.classList.add("tab-main");
        if (tab.id === state.activeTabId) div.classList.add("active");

        const icon =
          tab.type === "main"
            ? '<i class="fa-solid fa-house"></i>'
            : tab.type === "info"
            ? '<i class="fa-solid fa-circle-info"></i>'
            : '<i class="fa-solid fa-credit-card"></i>';

        div.innerHTML = `${icon}<span>${tab.title}</span>`;
        if (tab.type !== "main") {
          const btn = document.createElement("button");
          btn.className = "tab-close-btn";
          btn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            closeTabWithConfirm(tab);
          });
          div.appendChild(btn);
        }
        div.addEventListener("click", () => setActiveTab(tab.id));
        bar.appendChild(div);
      });
    }

    function closeTabWithConfirm(tab) {
      // Для любой операционной вкладки показываем «Сохранить прогресс?»
      if (tab.type === "operation") {
        showConfirm(
          "Сохранить прогресс?",
          () => {
            // Да – для карты сохраняем копию прогресса; для остальных просто закрываем
            if (tab.payload.operationName === "Карты" && !state.cardWizardFinished) {
              state.savedCardWizard = JSON.parse(JSON.stringify(state.cardWizard));
            }
            closeTab(tab.id);
          },
          () => {
            // Нет – закрываем и при необходимости сбрасываем данные операции (карта)
            if (tab.payload.operationName === "Карты") {
              state.cardWizard = null;
              state.cardWizardFinished = false;
              state.savedCardWizard = null;
            }
            closeTab(tab.id);
          }
        );
      } else {
        closeTab(tab.id);
      }
    }

    // ---------------- TAB CONTENT ----------------

    function renderActiveTabContent() {
      const host = qs("#tab-content-host");
      const tab = state.tabs.find((t) => t.id === state.activeTabId);
      if (!tab) {
        host.innerHTML = "";
        return;
      }
      if (tab.type === "main") {
        host.innerHTML = renderMainTabHTML();
        initMainTabInteractions();
      } else if (tab.type === "info") {
        host.innerHTML = renderInfoTabHTML(tab.payload.infoType);
      } else if (tab.type === "operation") {
        if (tab.payload.operationName === "Карты") {
          host.innerHTML = renderCardOperationHTML();
          initCardWizardHandlers();
        } else {
          host.innerHTML = renderSimpleOperationHTML(tab.payload.operationName);
        }
      }
    }

    function initMainTabInteractions() {

      const recommendedContainer = qs("#recommended-list");

      ];
      recommendedContainer.innerHTML = "";
      recommended.forEach((name) => {
        const card = document.createElement("div");

        card.textContent = name;
        card.addEventListener("click", () => handleOperationClick(name));
        recommendedContainer.appendChild(card);
      });

      // search + operation tiles
      const searchInput = qs("#operation-search");
      function renderTiles() {
        const q = (searchInput.value || "").trim().toLowerCase();
        const salesHost = qs("#ops-sales");
        const serviceHost = qs("#ops-service");
        salesHost.innerHTML = "";
        serviceHost.innerHTML = "";

        const addTiles = (names, host) => {
          names
            .filter(
              (n) => !q || n.toLowerCase().includes(q),
            )
            .forEach((name) => {
              const tile = document.createElement("div");
              tile.className = "operation-tile";
              const desc = operationDescriptions[name] || "";
              tile.innerHTML = desc
                ? `<span>${name}</span><span class="operation-tile-desc">${desc}</span>`
                : name;
              tile.addEventListener("click", () => handleOperationClick(name));
              host.appendChild(tile);
            });
        };
        addTiles(operationsSales, salesHost);
        addTiles(operationsService, serviceHost);
      }
      searchInput.addEventListener("input", renderTiles);
      renderTiles();

              <span class="request-date">${r.date}</span>
              <span class="badge ${statusClass}">${r.status}</span>

              </tbody>
            </table>
          </div>
        `;
      }
      return "";
    }

    // ---------------- OPERATION HANDLING ----------------

    function handleOperationClick(name) {
      // Проверка: если уже открыта какая-либо операционная вкладка
      const existingOpTab = state.tabs.find(t => t.type === 'operation');
      if (existingOpTab) {
        // Если открыта та же самая операция – переключаемся на неё
        if (existingOpTab.payload.operationName === name) {
          setActiveTab(existingOpTab.id);
          return;
        } else {
          // Иначе – предупреждение
          showAlert(
            "Сначала завершите текущую операцию или сохраните прогресс.",
            null
          );
          return;
        }
      }

      const openOperation = () => {
        if (name === "Карты") {
          // Восстанавливаем прогресс из сохранённого или создаём новый
          if (state.savedCardWizard) {
            state.cardWizard = JSON.parse(JSON.stringify(state.savedCardWizard));
            state.cardWizardFinished = false;
            state.savedCardWizard = null;
          } else if (!state.cardWizard || state.cardWizardFinished) {
            state.cardWizard = createCardWizardState();
            state.cardWizardFinished = false;
          }
          createTab("Оформление кредитной карты", "operation", {
            operationName: "Карты",
          });
        } else {
          createTab(name, "operation", { operationName: name });
        }
      };

      if (!state.sessionActive) {
        pendingOperationAfterSms = name;
        openSmsModal();
      } else {
        openOperation();
      }
    }

    function getContractText() {
      const text = `ДОГОВОР ОБСЛУЖИВАНИЯ КРЕДИТНОЙ КАРТЫ

1. ОБЩИЕ ПОЛОЖЕНИЯ
1.1. Настоящий договор регулирует условия обслуживания кредитной карты Банка.
1.2. Клиент обязуется соблюдать условия использования карты и своевременно вносить платежи.

2. ЛИМИТ И СТАВКА
2.1. Кредитный лимит устанавливается Банком в одностороннем порядке.
2.2. Процентная ставка указывается в условиях продукта (от 19% до 25% годовых).

3. ПОРЯДОК ПОГАШЕНИЯ
3.1. Минимальный платёж — не менее 5% от суммы задолженности.
3.2. Дата платежа — не позднее 25-го числа месяца, следующего за отчётным.

4. ШТРАФЫ И ПЕНИ

5. ЗАКЛЮЧИТЕЛЬНЫЕ ПОЛОЖЕНИЯ
5.1. Договор вступает в силу с момента подписания клиентом.`;

    function validateCurrentWizardStep() {
      const w = state.cardWizard;
      const d = w.data;
      const errors = {};
      switch (w.currentStep) {
        case 1:
          if (!d.fio.trim()) errors.fio = "Укажите ФИО";
          if (!d.birthDate) errors.birthDate = "Укажите дату рождения";
          if (!d.passportNumber.trim())
            errors.passportNumber = "Укажите номер паспорта";
          if (!d.passportIssuer.trim())
            errors.passportIssuer = "Укажите кем выдан паспорт";
          if (!d.passportIssueDate)
            errors.passportIssueDate = "Укажите дату выдачи";
          if (!d.passportDeptCode.trim())
            errors.passportDeptCode = "Укажите код подразделения";
          if (!d.confirmPersonal)
            errors.confirmPersonal =
              "Необходимо подтвердить корректность данных";
          break;
		case 2: {
		const incomeStr = String(d.income || "").trim();
		if (!incomeStr) {
		errors.income = "Укажите ежемесячный доход";
		} else {
		// Проверка на ведущий ноль (не допускается, если длина >1)
		if (incomeStr.length > 1 && incomeStr.startsWith('0')) {
			errors.income = "Число не должно начинаться с нуля";
		} else {
		const num = Number(incomeStr.replace(/\s/g, ""));
		if (isNaN(num) || num <= 0) {
			errors.income = "Укажите положительный доход (больше 0)";
		}
		}
		}
          if (!d.familyStatus)
            errors.familyStatus = "Выберите семейное положение";
          break;
        }
        case 3:
          if (!d.cardType) errors.cardType = "Выберите тип карты";
          break;
        case 5:
          if (!d.photoUploaded)
            errors.photoUploaded = "Подтвердите, что фото загружено";
          break;
        case 6:
          if (!d.agreeProduct)
            errors.agreeProduct =
              "Необходимо подтвердить условия оформления";
          break;
        case 7:
          if (!d.documentsSigned)
            errors.documentsSigned = "Необходимо подтвердить, что документы подписаны";
          break;
        default:
          break;
      }
      w.errors = errors;
      return Object.keys(errors).length === 0;
    }

    function renderInputGroup(
      id,
      label,
      value,
      error,
      type = "text",
      extra = {},
    ) {
      const extraAttrs = [];
      if (extra.min !== undefined) extraAttrs.push(`min="${extra.min}"`);
      if (extra.placeholder)
        extraAttrs.push(`placeholder="${extra.placeholder}"`);
      return `
        <div class="form-group">
          <label class="form-label">${label}</label>
          <input type="${type}" id="${id}" class="form-control" value="${
            value || ""
          }" ${extraAttrs.join(" ")} />
          ${error ? `<div class="form-error">${error}</div>` : ""}
        </div>
      `;
    }

    function renderCardRadio(value, label, desc, selected) {
      const imgUrl = CARD_IMAGE_URLS[value];
      const iconClass =
        value === "classic"
          ? "fa-credit-card"
          : value === "gold"
          ? "fa-crown"
          : "fa-gem";
      const imgContent = imgUrl
        ? `<img src="${imgUrl}" alt="${label}" class="card-type-img-img" />`
        : `<i class="fa-solid ${iconClass}"></i>`;
      return `
        <label class="radio-card" data-card-type="${value}">
          <input type="radio" name="cardType" value="${value}" ${
        selected ? "checked" : ""
      } style="margin-top:4px;" />
          <div class="card-type-img ${value}">${imgContent}</div>
          <div>
            <div>${label}</div>
            <div class="radio-desc">${desc}</div>
          </div>
        </label>
      `;
    }

    function renderCheckboxOption(key, label, checked) {
      return `
        <label class="checkbox-inline">
          <input type="checkbox" id="${key}" ${checked ? "checked" : ""} />
          <span>${label}</span>
        </label>
      `;
    }

    function initCardWizardHandlers() {
      const w = state.cardWizard;
      const d = w.data;

      // step-specific bindings
      if (w.currentStep === 1) {
        qs("#fio").addEventListener(
          "input",
          (e) => (d.fio = e.target.value),
        );
        qs("#birthDate").addEventListener(
          "input",
          (e) => (d.birthDate = e.target.value),
        );
        qs("#passportNumber").addEventListener(
          "input",
          (e) => (d.passportNumber = e.target.value),
        );
        qs("#passportIssuer").addEventListener(
          "input",
          (e) => (d.passportIssuer = e.target.value),
        );
        qs("#passportIssueDate").addEventListener(
          "input",
          (e) => (d.passportIssueDate = e.target.value),
        );
        qs("#passportDeptCode").addEventListener(
          "input",
          (e) => (d.passportDeptCode = e.target.value),
        );
        qs("#chk-confirm-personal").addEventListener(
          "change",
          (e) => (d.confirmPersonal = e.target.checked),
        );
      } else if (w.currentStep === 2) {
        qs("#income").addEventListener(
          "input",
          (e) => (d.income = e.target.value),
        );
        qs("#employer").addEventListener(
          "input",
          (e) => (d.employer = e.target.value),
        );
        const famSel = qs("#familyStatus");
        famSel.value = d.familyStatus || "";
        famSel.addEventListener(
          "change",
          (e) => (d.familyStatus = e.target.value),
        );
        qs("#dependents").addEventListener(
          "input",
          (e) => (d.dependents = e.target.value),
        );
      } else if (w.currentStep === 3) {
        qsa("[data-card-type]").forEach((el) => {
          el.addEventListener("click", (e) => {
            const v = el.getAttribute("data-card-type");
            d.cardType = v;
            if (v === "classic") d.rate = "25%";
            if (v === "gold") d.rate = "22%";
            if (v === "platinum") d.rate = "19%";
            renderActiveTabContent();
          });
        });
      } else if (w.currentStep === 4) {
        qs("#limit").addEventListener(
          "input",
          (e) => (d.limit = e.target.value),
        );
        qsa("#optSms,#optInsurance,#optLoyalty").forEach((el) => {
          el.addEventListener("change", (e) => {
            d[e.target.id] = e.target.checked;
          });
        });
      } else if (w.currentStep === 5) {
        const fileInput = qs("#photo-file");
        const previewWrap = qs("#photo-preview-wrap");
        const previewImg = qs("#photo-preview");
        if (d.photoObjectUrl) previewImg.setAttribute("src", d.photoObjectUrl);
        fileInput.addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (file && file.type.startsWith("image/")) {
            if (d.photoObjectUrl) URL.revokeObjectURL(d.photoObjectUrl);
            d.photoObjectUrl = URL.createObjectURL(file);
            d.photoUploaded = true;
            previewImg.src = d.photoObjectUrl;
            previewWrap.style.display = "block";
          }
        });
      } else if (w.currentStep === 6) {
        qs("#agreeProduct").addEventListener(
          "change",
          (e) => (d.agreeProduct = e.target.checked),
        );
      } else if (w.currentStep === 7) {
        qs("#comment").addEventListener(
          "input",
          (e) => (d.comment = e.target.value),
        );
        qs("#documentsSigned").addEventListener("change", (e) => {
          d.documentsSigned = e.target.checked;
        });
      }

      // navigation
      const btnPrev = qs("#btn-prev");
      const btnNext = qs("#btn-next");
      btnPrev.addEventListener("click", () => {
        if (w.currentStep > 1) {
          w.currentStep -= 1;
          renderActiveTabContent();
        }
      });
      btnNext.addEventListener("click", () => {
        const ok = validateCurrentWizardStep();
        if (!ok) {
          renderActiveTabContent();
          return;
        }
        if (w.currentStep < wizardStepTitles.length) {
          w.currentStep += 1;
          renderActiveTabContent();
        } else {
          // Finish
          state.cardWizardFinished = true;
          state.savedCardWizard = null;
          showConfirm(
            "Карта успешно заказана. Завершить операцию и закрыть вкладку?",
            () => {
              const opTab = state.tabs.find(
                (t) => t.type === "operation" && t.payload.operationName === "Карты",
              );
              if (opTab) {
                closeTab(opTab.id);
              }
            },
            () => {
              // keep tab open
              renderActiveTabContent();
            }
          );
        }
      });
    }

    // ---------------- SMS SESSION ----------------

    let pendingOperationAfterSms = null;

    function openSmsModal() {
      const backdrop = qs("#sms-backdrop");
      const input = qs("#sms-code-input");
      const errorEl = qs("#sms-error");
      errorEl.style.display = "none";
      errorEl.textContent = "";
      input.value = "";
      backdrop.style.display = "flex";
      setTimeout(() => input.focus(), 0);
    }

    function closeSmsModal() {
      qs("#sms-backdrop").style.display = "none";
    }

    function initSmsModalHandlers() {
      const btnCancel = qs("#sms-cancel");
      const btnConfirm = qs("#sms-confirm");
      const input = qs("#sms-code-input");
      const errorEl = qs("#sms-error");
      btnCancel.addEventListener("click", () => {
        pendingOperationAfterSms = null;
        closeSmsModal();
      });
      btnConfirm.addEventListener("click", () => {
        const code = input.value.trim();
        if (code !== "1234") {
          errorEl.textContent = "Неверный код. Попробуйте ещё раз.";
          errorEl.style.display = "block";
          return;
        }
        // success
        state.sessionActive = true;
        updateSessionIndicator();
        closeSmsModal();
        if (pendingOperationAfterSms) {
          const opName = pendingOperationAfterSms;
          pendingOperationAfterSms = null;
          handleOperationClick(opName);
        }
      });
    }

    function updateSessionIndicator() {
      const btn = qs("#session-btn");
      if (state.sessionActive) {
        btn.textContent = `${CLIENT_SHORT_NAME} | В сессии`;
        btn.classList.remove("secondary");
        btn.classList.add("outline");
        btn.disabled = true;
      } else {
        btn.innerHTML =
          '<i class="fa-solid fa-play"></i> Начать сессию';
        btn.classList.add("secondary");
        btn.disabled = false;
      }
    }

    // ---------------- BEFOREUNLOAD ----------------

    window.addEventListener("beforeunload", (e) => {
      const hasCardWizardInProgress = state.tabs.some(
        (t) => t.type === "operation" && t.payload.operationName === "Карты"
      ) && !state.cardWizardFinished;
      if (hasCardWizardInProgress) {
        e.preventDefault();
        e.returnValue = "";
      }
    });

    // ---------------- INIT ----------------

    function init() {
      ensureMainTab();
      qs("#client-fio").textContent = clientInfoFull.fio;
      renderTabs();
      renderDropdowns();
      initDropdownClicks();
      renderActiveTabContent();
      updateSessionIndicator();
      qs("#session-btn").addEventListener("click", () => {
        if (!state.sessionActive) {
          pendingOperationAfterSms = null;
          openSmsModal();
        }
      });
      initSmsModalHandlers();

      const modals = qsa('.modal-backdrop');
      modals.forEach(modal => {
        modal.addEventListener('click', (e) => {
          if (e.target === modal) {
            modal.style.display = 'none';
          }
        });
      });
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
